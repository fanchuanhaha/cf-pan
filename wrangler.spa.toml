# 彩虹外链网盘 Cloudflare Workers + Static Assets 一体化部署配置
name = "pan-worker"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat", "assets_navigation_has_no_effect"]

[dev]
port = 8787
local_protocol = "http"

[vars]
ENCRYPTION_SECRET = "default-encryption-key-change-me"
ADMIN_TOKEN_EXPIRY_DAYS = "7"
SITE_TITLE = "彩虹外链网盘"
SITE_URL = ""

# R2 存储桶绑定 - 可选 (如果 API Token 有 R2 权限才启用)
# 如果你打算使用 S3 或 GitHub API 作为存储后端，可以注释掉下面这段
# [[r2_buckets]]
# binding = "FILE_R2"
# bucket_name = "pan-files"

# D1 数据库绑定 - 替换为实际的 database_id
# 修复后台显示 0 文件的 Bug：开启 read replication 后，
# 写后立即从读副本查询会看不到新数据（最终一致性问题）
# 显式关闭读副本，让所有读都走主库；如需极致性能再单独评估
[[d1_databases]]
binding = "DB"
database_name = "pan-db"
database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
read_replication = { enabled = false }

# Static Assets 配置 - 托管前端静态资源
[assets]
directory = "./public"
not_found_handling = "single-page-application"
run_worker_first = ["/", "/ajax.php", "/api.php", "/down.php", "/view.php", "/file.php", "/admin/*", "/health", "/install", "/install/*"]
