name: Deploy to Cloudflare Workers (SPA 一体化)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          echo "安装后端依赖..."
          if npm ci; then
            echo "✅ npm ci 成功"
          else
            echo "⚠️ npm ci 失败，使用 npm install 生成 lock 文件..."
            npm install
          fi

      - name: Disable wrangler telemetry
        run: npx wrangler telemetry disable

      # ==================== D1 数据库：自动创建 + 更新 wrangler.spa.toml ====================
      - name: Create or verify D1 Database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "检查并创建 D1 数据库..."
          DATABASE_LIST=$(npx wrangler d1 list --remote --json 2>/dev/null || echo "[]")
          EXISTING_DB=$(echo "$DATABASE_LIST" | jq -r '.[] | select(.name=="pan-db") | .uuid')

          if [ -n "$EXISTING_DB" ]; then
            echo "✅ 找到现有 D1 数据库: $EXISTING_DB"
            DATABASE_ID=$EXISTING_DB
          else
            echo "创建新的 D1 数据库..."
            CREATE_OUTPUT=$(npx wrangler d1 create pan-db --remote 2>&1)
            echo "$CREATE_OUTPUT"

            if echo "$CREATE_OUTPUT" | grep -q "Successfully created DB"; then
              DATABASE_ID=$(echo "$CREATE_OUTPUT" | grep -oP 'database_id\s*=\s*"\K[^"]+' || echo "$CREATE_OUTPUT" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
              echo "✅ 数据库创建成功: $DATABASE_ID"
            else
              LIST_OUTPUT=$(npx wrangler d1 list --remote --json 2>/dev/null || echo "[]")
              DATABASE_ID=$(echo "$LIST_OUTPUT" | jq -r '.[] | select(.name=="pan-db") | .uuid')

              if [ -z "$DATABASE_ID" ]; then
                echo "❌ 无法创建或找到 D1 数据库"
                exit 1
              fi
            fi
          fi

          echo "更新 wrangler.spa.toml 中的数据库 ID..."
          sed -i -E "s/(database_id = \")[^\"]+(\"\s*$)/\1$DATABASE_ID\2/" wrangler.spa.toml
          if grep -q "$DATABASE_ID" wrangler.spa.toml; then
            echo "✅ wrangler.spa.toml 更新成功"
          else
            echo "❌ wrangler.spa.toml 更新失败"
            exit 1
          fi

          echo "database_id=$DATABASE_ID" >> $GITHUB_ENV

      - name: Initialize D1 Database schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "初始化数据库表结构..."
          npx wrangler d1 execute pan-db --remote --file=./schema.sql || echo "⚠️ 表可能已存在，继续部署"

      # ==================== 部署 ====================
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🚀 部署到 Cloudflare Workers..."
          DEPLOY_OUTPUT=$(npx wrangler deploy --config wrangler.spa.toml 2>&1)
          echo "$DEPLOY_OUTPUT"

          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[^\s]+\.workers\.dev' | head -1)
          if [ -n "$DEPLOY_URL" ]; then
            SAFE_URL=$(echo "$DEPLOY_URL" | sed 's/\.workers\.dev$/.***dev/')
            echo "✅ 部署成功: $SAFE_URL"
          else
            echo "✅ 部署完成"
          fi
