# =====================================================================
# 彩虹外链网盘 - 一键部署到 Cloudflare Workers
#
# 使用方法：
#   1. Fork 此仓库到你的 GitHub
#   2. 在仓库 Settings → Secrets and variables → Actions 中添加：
#
#   【必需的 Secrets】
#     CLOUDFLARE_API_TOKEN     Cloudflare API Token (需要 Workers+D1 权限)
#     CLOUDFLARE_ACCOUNT_ID     Cloudflare 账户 ID
#
#   【可选的 Secrets（用于跳过 /install 页面）】
#     ADMIN_USER               管理员账号 (默认: admin)
#     ADMIN_PWD                管理员密码 (必填才会启用自动配置)
#     SITE_TITLE               站点名称 (默认: 彩虹外链网盘)
#     STORAGE_TYPE             存储类型 (默认: r2)
#                             可选: r2 / s3 / github / webdav / upyun / qiniu
#                               默认 r2，不需要额外配置
#                               设为 qiniu 时需要填写以下 QINIU_* 项
#     QINIU_AK                 七牛云 AccessKey (仅 STORAGE_TYPE=qiniu 时生效)
#     QINIU_SK                 七牛云 SecretKey (同上)
#     QINIU_BUCKET             七牛云存储空间名称 (同上)
#     QINIU_DOMAIN             七牛云绑定域名 (同上，例如 https://dlp.wn5.top)
#     QINIU_FOLDER             七牛云存储子目录 (默认: file，同上)
#
#   3. 在 Actions 页面手动运行 "Deploy to Cloudflare Workers"，或
#      推送 main 分支自动触发
# =====================================================================

name: Deploy to Cloudflare Workers (SPA 一体化)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          echo "安装依赖..."
          npm ci

      - name: Disable wrangler telemetry
        run: npx wrangler telemetry disable

      # ==================== D1 数据库：自动创建 + 配置 ====================
      - name: Create or verify D1 Database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "检查并创建 D1 数据库..."

          # 容错地获取 D1 列表：
          #   - wrangler 4.x 的 --json 输出格式在不同小版本之间存在差异，
          #     有时会输出非 JSON 文本（warning、版本信息、空提示），
          #     此时 || echo "[]" 不会触发（wrangler 仍以 0 退出）。
          #   - 因此必须先用 jq 校验输出是否为合法 JSON，否则一律按空数组处理。
          set +e
          DATABASE_LIST=$(npx wrangler d1 list --config wrangler.spa.toml --json 2>/dev/null)
          LIST_EXIT=$?
          set -e

          echo "wrangler d1 list 退出码: $LIST_EXIT"
          if [ $LIST_EXIT -ne 0 ] || [ -z "$DATABASE_LIST" ]; then
            echo "⚠️  d1 list 无输出或命令失败，使用空数组"
            DATABASE_LIST="[]"
          elif ! echo "$DATABASE_LIST" | jq -e . >/dev/null 2>&1; then
            echo "⚠️  d1 list 输出非合法 JSON，使用空数组"
            echo "原始输出前 200 字节: $(printf '%s' "$DATABASE_LIST" | head -c 200)"
            DATABASE_LIST="[]"
          fi

          EXISTING_DB=$(echo "$DATABASE_LIST" | jq -r '.[]? | select(.name=="pan-db") | .uuid // .id // empty' 2>/dev/null)

          if [ -n "$EXISTING_DB" ] && [ "$EXISTING_DB" != "null" ]; then
            echo "✅ 找到现有 D1 数据库: $EXISTING_DB"
            DATABASE_ID=$EXISTING_DB
          else
            echo "未找到现有 D1 数据库，尝试创建..."
            set +e
            CREATE_OUTPUT=$(npx wrangler d1 create pan-db --config wrangler.spa.toml 2>&1)
            CREATE_EXIT=$?
            set -e

            if [ $CREATE_EXIT -eq 0 ] && echo "$CREATE_OUTPUT" | grep -q "Successfully created DB"; then
              DATABASE_ID=$(echo "$CREATE_OUTPUT" | grep -oP "database_id = \"\K[^\"]+")
              if [ -z "$DATABASE_ID" ]; then
                DATABASE_ID=$(echo "$CREATE_OUTPUT" | grep -oP "([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})")
              fi
              echo "✅ 数据库创建成功: $DATABASE_ID"
            else
              echo "⚠️  d1 create 失败或返回异常，回退到再次 list"
              set +e
              LIST2=$(npx wrangler d1 list --config wrangler.spa.toml --json 2>/dev/null)
              set -e
              if [ -n "$LIST2" ] && echo "$LIST2" | jq -e . >/dev/null 2>&1; then
                DATABASE_ID=$(echo "$LIST2" | jq -r '.[]? | select(.name=="pan-db") | .uuid // .id // empty' 2>/dev/null)
              fi
              if [ -z "$DATABASE_ID" ] || [ "$DATABASE_ID" = "null" ]; then
                echo "❌ 无法创建或找到 D1 数据库"
                echo "CREATE_OUTPUT: $CREATE_OUTPUT"
                exit 1
              fi
            fi
          fi

          echo "更新 wrangler.spa.toml 中的数据库 ID..."
          # 兼容 database_id = "..." 和 [[d1_databases]] 块下的 database_id
          sed -i -E "s/(database_id = \")[^\"]+(\")/\1$DATABASE_ID\2/g" wrangler.spa.toml

          if grep -q "$DATABASE_ID" wrangler.spa.toml; then
            echo "✅ wrangler.spa.toml 更新成功"
          else
            echo "❌ wrangler.spa.toml 更新失败"
            exit 1
          fi

          echo "database_id=$DATABASE_ID" >> $GITHUB_ENV

      - name: Initialize D1 Database schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "初始化数据库表结构..."
          npx wrangler d1 execute pan-db --config wrangler.spa.toml --file=./schema.sql --remote || echo "⚠️ 表可能已存在，继续部署"

      # ==================== R2 存储桶 (可选) ====================
      - name: Create R2 bucket (optional, only if R2 is enabled in wrangler.toml)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        continue-on-error: true
        run: |
          echo "检查 wrangler.spa.toml 是否启用了 R2..."
          if grep -q "^\[\[r2_buckets\]\]" wrangler.spa.toml; then
            echo "✅ 检测到 R2 绑定已启用，尝试创建存储桶..."
            CREATE_OUTPUT=$(npx wrangler r2 bucket create pan-files --config wrangler.spa.toml 2>&1)
            CREATE_EXIT=$?
            
            if [ $CREATE_EXIT -eq 0 ]; then
              echo "✅ R2 存储桶创建成功"
            elif echo "$CREATE_OUTPUT" | grep -q "10042"; then
              echo ""
              echo "⚠️  R2 未启用 (code: 10042)"
              echo "===================================="
              echo "请二选一："
              echo ""
              echo "方案 A: 启用 R2 + 修 Token"
              echo "  1. https://dash.cloudflare.com/?to=/:account/r2 启用 R2"
              echo "  2. https://dash.cloudflare.com/profile/api-tokens 编辑 Token"
              echo "     添加 'Account > R2: Edit' 权限"
              echo ""
              echo "方案 B: 使用其他存储 (推荐)"
              echo "  部署后访问 /install/ 选择 S3 或 GitHub API"
              echo "===================================="
            else
              echo "⚠️  R2 存储桶创建失败 (可能已存在或其他原因)"
              echo "详细输出: $CREATE_OUTPUT"
            fi
          else
            echo "ℹ️  R2 未在 wrangler.spa.toml 中启用"
            echo "   部署后访问 /install/ 可选择 R2 / S3 / GitHub API 任一存储后端"
          fi

      # ==================== 部署 ====================
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🚀 部署到 Cloudflare Workers..."
          npx wrangler deploy --config wrangler.spa.toml 2>&1 | sed -E 's/https:\/\/[a-zA-Z0-9.-]*\.(workers|pages)\.dev/https:\/\/[REDACTED].\1.dev/g'

      # ==================== 从 Secrets 自动配置 ====================
      # 如果设置了 ADMIN_PWD，则自动写入配置到 D1 并标记为已安装
      # 这样部署后直接可用，无需手动访问 /install/ 页面
      # 注意：GitHub Actions 不支持在 if: 中使用 secrets，改用 shell 级别判断
      - name: Auto-configure from Secrets (跳过安装向导)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_USER: ${{ secrets.ADMIN_USER || 'admin' }}
          ADMIN_PWD: ${{ secrets.ADMIN_PWD }}
          SITE_TITLE: ${{ secrets.SITE_TITLE || '彩虹外链网盘' }}
          STORAGE_TYPE: ${{ secrets.STORAGE_TYPE || 'r2' }}
          QINIU_AK: ${{ secrets.QINIU_AK || '' }}
          QINIU_SK: ${{ secrets.QINIU_SK || '' }}
          QINIU_BUCKET: ${{ secrets.QINIU_BUCKET || '' }}
          QINIU_DOMAIN: ${{ secrets.QINIU_DOMAIN || '' }}
          QINIU_FOLDER: ${{ secrets.QINIU_FOLDER || 'file' }}
        run: |
          # 如果没有设置 ADMIN_PWD，则跳过自动配置
          if [ -z "$ADMIN_PWD" ]; then
            echo "ℹ️  未检测到 ADMIN_PWD，跳过自动配置。"
            echo "   如需自动配置，请在 GitHub Secrets 中添加 ADMIN_PWD。"
            echo "   也可以部署后手动访问 /install/ 完成配置。"
            exit 0
          fi

          echo "检测到 ADMIN_PWD，开始自动配置..."

          # SQL 值转义函数：将单引号替换为两个单引号
          sql_escape() {
            echo "$1" | sed "s/'/''/g"
          }

          # 构建 SQL
          SQL=""

          # 管理员账号
          SQL+="INSERT OR REPLACE INTO pre_config (k, v) VALUES ('admin_user', '$(sql_escape "$ADMIN_USER")');"
          SQL+="INSERT OR REPLACE INTO pre_config (k, v) VALUES ('admin_pwd', '$(sql_escape "$ADMIN_PWD")');"
          echo "  - admin_user = $ADMIN_USER"

          # 站点名称
          SQL+="INSERT OR REPLACE INTO pre_config (k, v) VALUES ('title', '$(sql_escape "$SITE_TITLE")');"
          echo "  - title = $SITE_TITLE"

          # 存储类型
          SQL+="INSERT OR REPLACE INTO pre_config (k, v) VALUES ('storage', '$(sql_escape "$STORAGE_TYPE")');"
          echo "  - storage = $STORAGE_TYPE"

          # 根据存储类型写入对应的配置项
          if [ "$STORAGE_TYPE" = "qiniu" ]; then
            SQL+="INSERT OR REPLACE INTO pre_config (k, v) VALUES ('qiniu_ak', '$(sql_escape "$QINIU_AK")');"
            SQL+="INSERT OR REPLACE INTO pre_config (k, v) VALUES ('qiniu_sk', '$(sql_escape "$QINIU_SK")');"
            SQL+="INSERT OR REPLACE INTO pre_config (k, v) VALUES ('qiniu_bucket', '$(sql_escape "$QINIU_BUCKET")');"
            SQL+="INSERT OR REPLACE INTO pre_config (k, v) VALUES ('qiniu_domain', '$(sql_escape "$QINIU_DOMAIN")');"
            SQL+="INSERT OR REPLACE INTO pre_config (k, v) VALUES ('qiniu_folder', '$(sql_escape "$QINIU_FOLDER")');"
            echo "  - qiniu 配置已写入"
          fi

          # R2 不需要额外配置，wrangler.toml 已绑定
          if [ "$STORAGE_TYPE" = "r2" ]; then
            echo "  - R2 无需额外配置（wrangler.toml 已绑定）"
          fi

          # 标记为已安装
          SQL+="INSERT OR REPLACE INTO pre_config (k, v) VALUES ('installed', '1');"

          # 执行 SQL
          echo ""
          echo "执行 D1 配置写入..."
          npx wrangler d1 execute pan-db --config wrangler.spa.toml --command="$SQL" --remote

          if [ $? -eq 0 ]; then
            echo ""
            echo "============================================="
            echo "✅ 配置完成！应用已就绪！"
            echo "   管理员账号: $ADMIN_USER"
            echo "   存储类型:   $STORAGE_TYPE"
            echo "============================================="
          else
            echo ""
            echo "⚠️  D1 写入失败，你可能需要手动访问 /install/ 完成配置"
          fi
