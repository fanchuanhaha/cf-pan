name: Deploy to Cloudflare Workers (SPA 一体化)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 安装后端依赖（参考 CloudPaste: ci 失败时 fallback 到 install）
      - name: Install dependencies
        run: |
          echo "安装后端依赖..."
          if npm ci; then
            echo "✅ npm ci 成功"
          else
            echo "⚠️ npm ci 失败，使用 npm install 生成 lock 文件..."
            npm install
          fi

      - name: Disable wrangler telemetry
        run: npx wrangler telemetry disable

      # 创建或验证 D1 数据库
      - name: Create or verify D1 Database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "检查并创建 D1 数据库..."
          DATABASE_LIST=$(npx wrangler d1 list --json 2>/dev/null || echo "[]")
          EXISTING_DB=$(echo "$DATABASE_LIST" | jq -r '.[] | select(.name=="pan-db") | .uuid')

          if [ -n "$EXISTING_DB" ]; then
            echo "✅ 找到现有 D1 数据库: $EXISTING_DB"
            DATABASE_ID=$EXISTING_DB
          else
            echo "创建新的 D1 数据库..."
            CREATE_OUTPUT=$(npx wrangler d1 create pan-db 2>&1)
            echo "$CREATE_OUTPUT"

            if echo "$CREATE_OUTPUT" | grep -qi "success"; then
              DATABASE_ID=$(echo "$CREATE_OUTPUT" | grep -oP 'database_id\s*=\s*"\K[^"]+' || echo "$CREATE_OUTPUT" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
              echo "✅ 数据库创建成功: $DATABASE_ID"
            else
              LIST_OUTPUT=$(npx wrangler d1 list --json 2>/dev/null || echo "[]")
              DATABASE_ID=$(echo "$LIST_OUTPUT" | jq -r '.[] | select(.name=="pan-db") | .uuid')
            fi
          fi

          if [ -z "$DATABASE_ID" ]; then
            echo "❌ 无法创建或找到 D1 数据库"
            exit 1
          fi

          # 更新 wrangler.spa.toml 中的 database_id
          sed -i -E "s/(database_id = \")[^\"]+(\"\s*$)/\1$DATABASE_ID\2/" wrangler.spa.toml
          echo "✅ wrangler.spa.toml 更新完成"

          echo "database_id=$DATABASE_ID" >> $GITHUB_ENV

      # 初始化 D1 表结构
      - name: Initialize D1 Database schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "初始化数据库表结构..."
          npx wrangler d1 execute pan-db --file=./schema.sql || echo "⚠️ 表可能已存在，继续部署"

      # 处理 ENCRYPTION_SECRET (参考 CloudPaste)
      - name: Resolve ENCRYPTION_SECRET for deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🔐 检查 ENCRYPTION_SECRET..."
          WORKER_NAME=$(grep -oP 'name\s*=\s*"\K[^"]+' wrangler.spa.toml)
          echo "Worker name: $WORKER_NAME"

          # 检查 Worker 是否已有 Secret
          # 如果 GitHub Secrets 有 ENCRYPTION_SECRET，则用它覆盖 wrangler.spa.toml
          if [ -n "${{ secrets.ENCRYPTION_SECRET }}" ]; then
            echo "使用 GitHub Secrets 中的 ENCRYPTION_SECRET"
            sed -i "s/ENCRYPTION_SECRET = \".*\"/ENCRYPTION_SECRET = \"${{ secrets.ENCRYPTION_SECRET }}\"/" wrangler.spa.toml
          else
            echo "使用 wrangler.spa.toml 中的默认 ENCRYPTION_SECRET"
          fi

      # 部署到 Cloudflare
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🚀 部署到 Cloudflare Workers..."
          DEPLOY_OUTPUT=$(npx wrangler deploy --config wrangler.spa.toml 2>&1)
          echo "$DEPLOY_OUTPUT"

          # 提取部署 URL
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[^\s]+\.workers\.dev' | head -1)
          if [ -n "$DEPLOY_URL" ]; then
            # 脱敏显示
            SAFE_URL=$(echo "$DEPLOY_URL" | sed 's/\.workers\.dev$/.***dev/')
            echo "✅ 部署成功: $SAFE_URL"
          else
            echo "✅ 部署完成 (URL 已脱敏)"
          fi
