name: Deploy to Cloudflare Workers (SPA 一体化)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          echo "安装后端依赖..."
          if npm ci; then
            echo "✅ npm ci 成功"
          else
            echo "⚠️ npm ci 失败，使用 npm install 生成 lock 文件..."
            npm install
          fi

      - name: Disable wrangler telemetry
        run: npx wrangler telemetry disable

      # ==================== D1 数据库：自动创建 + 更新 wrangler.spa.toml ====================
      - name: Create or verify D1 Database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "创建 D1 数据库（如已存在会自动跳过）..."
          CREATE_OUTPUT=$(npx wrangler d1 create pan-db 2>&1) || true
          echo "$CREATE_OUTPUT"

          # 尝试从 create 输出提取 ID
          DATABASE_ID=$(echo "$CREATE_OUTPUT" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          # 如果提取不到（可能已存在），从 list 中找
          if [ -z "$DATABASE_ID" ]; then
            echo "数据库可能已存在，从列表中查找..."
            LIST_OUTPUT=$(npx wrangler d1 list 2>&1) || true
            echo "$LIST_OUTPUT"
            DATABASE_ID=$(echo "$LIST_OUTPUT" | grep -A2 '"name": "pan-db"' | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          fi

          if [ -z "$DATABASE_ID" ]; then
            echo "❌ 无法获取 D1 数据库 ID，请检查 API Token 权限"
            exit 1
          fi

          echo "✅ D1 数据库 ID: $DATABASE_ID"

          echo "更新 wrangler.spa.toml 中的 database_id..."
          sed -i -E "s/(database_id = \")[^\"]+(\"\s*$)/\1$DATABASE_ID\2/" wrangler.spa.toml
          if grep -q "$DATABASE_ID" wrangler.spa.toml; then
            echo "✅ wrangler.spa.toml 更新成功"
          else
            echo "❌ wrangler.spa.toml 更新失败"
            exit 1
          fi

          echo "database_id=$DATABASE_ID" >> $GITHUB_ENV

      - name: Initialize D1 Database schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "初始化数据库表结构..."
          npx wrangler d1 execute pan-db --file=./schema.sql || echo "⚠️ 表可能已存在，继续部署"

      # ==================== 部署 ====================
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "🚀 部署到 Cloudflare Workers..."
          DEPLOY_OUTPUT=$(npx wrangler deploy --config wrangler.spa.toml 2>&1)
          echo "$DEPLOY_OUTPUT"

          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[^\s]+\.workers\.dev' | head -1)
          if [ -n "$DEPLOY_URL" ]; then
            SAFE_URL=$(echo "$DEPLOY_URL" | sed 's/\.workers\.dev$/.***dev/')
            echo "✅ 部署成功: $SAFE_URL"
          else
            echo "✅ 部署完成"
          fi
